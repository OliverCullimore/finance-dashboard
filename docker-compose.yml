services:
  backend:
    build:
      context: backend
    #restart: unless-stopped
    environment:
      - TIMEZONE=${TIMEZONE}
      - LOG_LEVEL=${LOG_LEVEL}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      - FRONTEND_HOST=${FRONTEND_HOST}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY}
      - CLERK_JWT_KEY=${CLERK_JWT_KEY}
      - GOCARDLESS_API_KEY_ID=${GOCARDLESS_API_KEY_ID}
      - GOCARDLESS_API_KEY_SECRET=${GOCARDLESS_API_KEY_SECRET}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:10.3
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 1s
      timeout: 5s
      retries: 10
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres:/var/lib/postgresql/data
    ports:
      - '5432:5432'

  frontend:
    build:
      context: frontend
      args:
        - VITE_CLERK_PUBLISHABLE_KEY=${CLERK_PUBLIC_KEY}
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres:
  caddy_data:
  caddy_config: